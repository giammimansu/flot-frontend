<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLOT — Entry Point</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #E8E8ED;
    font-family: var(--font-body);
  }
  /* Phone frame */
  .phone {
    width: 375px; background: var(--surface-0);
    border-radius: 44px; border: 1.5px solid var(--hairline-strong);
    overflow: hidden; position: relative;
    display: flex; flex-direction: column;
    box-shadow: 0 40px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  }
  /* Pulse dot */
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(1.25)} }
  .dot-pulse { width:8px;height:8px;border-radius:999px;background:var(--amber);animation:pulse 1.4s infinite }
  /* Press state */
  .pressable { transition: transform 120ms var(--ease-out); cursor: pointer; }
  .pressable:active { transform: scale(0.97); }
  /* Divider */
  .divider-row {
    display:flex; align-items:center; gap:12px; padding:0 20px; margin:22px 0 18px;
  }
  .divider-row::before,.divider-row::after {
    content:''; flex:1; height:1px; background:var(--hairline);
  }
  .divider-row span {
    font-size:11px; font-weight:500; color:var(--ink-subtle); white-space:nowrap;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MalpensaComponents.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const EntryPoint = () => {
  return (
    <div className="phone">
      {/* ── TOP NAV ── */}
      <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        {/* Logo */}
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:8, height:8, borderRadius:999, background:'var(--amber)', flexShrink:0 }}></div>
          <span style={{ fontFamily:'var(--font-display)', fontSize:22, fontWeight:800, color:'var(--ink)', letterSpacing:'-0.01em' }}>FLOT</span>
        </div>
        {/* Help */}
        <button className="pressable" style={{
          width:36, height:36, borderRadius:999, border:'1px solid var(--hairline)',
          background:'var(--surface-1)', display:'flex', alignItems:'center', justifyContent:'center',
          color:'var(--ink)', padding:0,
        }}>
          <MIcon name="help-circle" size={18}/>
        </button>
      </div>

      {/* ── HERO ── */}
      <div style={{ padding:'22px 20px 0' }}>
        {/* Kicker pill */}
        <div style={{
          display:'inline-flex', alignItems:'center', gap:8,
          padding:'6px 14px', borderRadius:999,
          background:'var(--amber-soft)', marginBottom:16,
        }}>
          <div className="dot-pulse"></div>
          <span style={{ fontSize:13, fontWeight:600, color:'#92400E' }}>Malpensa · Milano</span>
        </div>

        {/* Headline */}
        <h1 style={{
          fontFamily:'var(--font-display)', fontSize:32, fontWeight:800,
          lineHeight:1.05, letterSpacing:'-0.025em', color:'var(--ink)', margin:0,
        }}>
          Split the <span style={{ color:'var(--amber)' }}>€120</span><br/>Malpensa fare.
        </h1>

        {/* Subtitle */}
        <p style={{
          fontFamily:'var(--font-body)', fontSize:15, lineHeight:1.5,
          color:'var(--ink-muted)', margin:'10px 0 0', textWrap:'pretty',
        }}>
          We match you with a traveler heading your way. No match, no charge — ever.
        </p>
      </div>

      {/* ── SAVINGS CARD ── */}
      <div style={{
        margin:'20px 20px 0', padding:'16px 18px',
        background:'var(--surface-1)', border:'1px solid var(--hairline)',
        borderRadius:20, boxShadow:'var(--shadow-card)',
        display:'flex', alignItems:'center', gap:14,
      }}>
        <div style={{
          width:42, height:42, borderRadius:999, background:'var(--success-soft)',
          display:'flex', alignItems:'center', justifyContent:'center', color:'#15803D', flexShrink:0,
        }}>
          <MIcon name="sparkles" size={20} sw={2}/>
        </div>
        <div>
          <div style={{
            fontFamily:'var(--font-body)', fontSize:11, fontWeight:600,
            color:'var(--ink-subtle)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:4,
          }}>You save up to</div>
          <div style={{
            fontFamily:'var(--font-display)', fontSize:22, fontWeight:800,
            color:'var(--success)', lineHeight:1, fontFeatureSettings:'"tnum" 1',
          }}>€60.00</div>
          <div style={{
            fontFamily:'var(--font-body)', fontSize:12, color:'var(--ink-muted)', marginTop:4,
          }}>on every matched ride · fixed fare</div>
        </div>
      </div>

      {/* ── DIVIDER ── */}
      <div className="divider-row"><span>Get started</span></div>

      {/* ── AUTH BUTTONS ── */}
      <div style={{ padding:'0 20px', display:'flex', flexDirection:'column', gap:10 }}>
        {/* Google */}
        <button className="pressable" style={{
          width:'100%', height:52, borderRadius:16,
          border:'1px solid var(--hairline)', background:'var(--surface-1)',
          boxShadow:'var(--shadow-card)', display:'flex', alignItems:'center',
          justifyContent:'center', gap:10, padding:0, cursor:'pointer',
        }}>
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.998 23.998 0 000 24c0 3.77.9 7.35 2.56 10.56l7.97-5.97z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          <span style={{ fontFamily:'var(--font-body)', fontSize:15, fontWeight:600, color:'var(--ink)' }}>Continue with Google</span>
        </button>

        {/* Apple */}
        <button className="pressable" style={{
          width:'100%', height:52, borderRadius:16,
          border:'none', background:'var(--ink)', color:'#FFFFFF',
          display:'flex', alignItems:'center', justifyContent:'center',
          gap:10, padding:0, cursor:'pointer',
        }}>
          <svg width="18" height="22" viewBox="0 0 18 22" fill="#FFFFFF">
            <path d="M14.94 11.58c-.02-2.27 1.86-3.37 1.94-3.42-1.06-1.54-2.71-1.75-3.29-1.78-1.4-.14-2.73.82-3.44.82-.71 0-1.82-.8-2.99-.78-1.54.02-2.96.9-3.75 2.27-1.6 2.78-.41 6.9 1.15 9.15.76 1.1 1.67 2.34 2.87 2.3 1.15-.05 1.58-.75 2.97-.75 1.39 0 1.78.75 2.99.72 1.24-.02 2.02-1.12 2.77-2.23.87-1.27 1.23-2.5 1.25-2.57-.03-.01-2.4-.92-2.42-3.65l-.05-.08zM12.63 4.54c.63-.77 1.06-1.83.94-2.89-.91.04-2.01.61-2.66 1.37-.59.68-1.1 1.77-.96 2.81 1.01.08 2.04-.51 2.68-1.29z"/>
          </svg>
          <span style={{ fontFamily:'var(--font-body)', fontSize:15, fontWeight:600, color:'#FFFFFF' }}>Continue with Apple</span>
        </button>
      </div>

      {/* ── TERMS ── */}
      <div style={{
        marginTop:14, textAlign:'center', padding:'0 30px',
        fontFamily:'var(--font-body)', fontSize:11, lineHeight:1.5, color:'var(--ink-subtle)',
      }}>
        <span>By continuing you agree to our <span style={{ textDecoration:'underline', textUnderlineOffset:2 }}>Terms</span> and <span style={{ textDecoration:'underline', textUnderlineOffset:2 }}>Privacy Policy</span>.</span>
        <div style={{ marginTop:6 }}>
          Already have an account? <span style={{ color:'var(--ink)', fontWeight:600, cursor:'pointer' }}>Sign in</span>
        </div>
      </div>

      {/* ── HOME INDICATOR ── */}
      <div style={{ display:'flex', justifyContent:'center', margin:'20px auto 10px' }}>
        <div style={{ width:134, height:5, borderRadius:999, background:'rgba(15,23,42,0.18)' }}></div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<EntryPoint/>);
</script>
</body>
</html>
