<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLOT — Match Locked (4 States)</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #E8E8ED; font-family: var(--font-body);
  }
  .pressable { transition: transform 120ms var(--ease-out); cursor: pointer; }
  .pressable:active { transform: scale(0.97); }
  @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes checkDraw {
    0% { stroke-dashoffset: 36; }
    100% { stroke-dashoffset: 0; }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(245,158,11,0); }
  }
  @keyframes countdownPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  @keyframes spinSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MalpensaComponents.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "state": "partner_waiting",
  "partnerName": "Marco",
  "savings": "60.00",
  "destination": "Milano Centrale",
  "price": "0.99",
  "countdownMin": 13,
  "countdownSec": 59
}/*EDITMODE-END*/;

// ─── Icons ───
const LockIcon = ({ size = 24, color = 'currentColor', sw = 2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
);
const UnlockIcon = ({ size = 24, color = 'currentColor', sw = 2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
  </svg>
);
const ClockIcon = ({ size = 20, color = 'currentColor', sw = 2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
  </svg>
);
const RefreshIcon = ({ size = 20, color = 'currentColor', sw = 2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/>
  </svg>
);

// ─── Circular Countdown ───
const CircularCountdown = ({ minutes, seconds, radius = 36, stroke = 4, color }) => {
  const total = 15 * 60;
  const elapsed = total - (minutes * 60 + seconds);
  const progress = Math.max(0, 1 - elapsed / total);
  const circ = 2 * Math.PI * radius;
  const offset = circ * (1 - progress);
  return (
    <div style={{ position: 'relative', width: radius * 2 + stroke, height: radius * 2 + stroke }}>
      <svg width={radius * 2 + stroke} height={radius * 2 + stroke} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={radius + stroke/2} cy={radius + stroke/2} r={radius}
          fill="none" stroke="var(--hairline)" strokeWidth={stroke}/>
        <circle cx={radius + stroke/2} cy={radius + stroke/2} r={radius}
          fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s linear' }}/>
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
      }}>
        <span style={{
          fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 800,
          color: 'var(--ink)', fontFeatureSettings: '"tnum" 1',
        }}>{String(minutes).padStart(2,'0')}:{String(seconds).padStart(2,'0')}</span>
        <span style={{ fontSize: 9, fontWeight: 600, color: 'var(--ink-subtle)', letterSpacing: '0.06em', textTransform: 'uppercase', marginTop: 1 }}>left</span>
      </div>
    </div>
  );
};

// ─── Linear Countdown Bar ───
const LinearCountdown = ({ minutes, seconds }) => {
  const total = 15 * 60;
  const remaining = minutes * 60 + seconds;
  const progress = remaining / total;
  return (
    <div style={{ width: '100%', height: 6, borderRadius: 999, background: 'var(--hairline)', overflow: 'hidden' }}>
      <div style={{
        height: '100%', borderRadius: 999,
        background: progress > 0.3 ? 'var(--amber)' : 'var(--error)',
        width: `${progress * 100}%`,
        transition: 'width 1s linear',
      }}></div>
    </div>
  );
};

// ─── Trust Badge ───
const TrustBadge = ({ children }) => (
  <div style={{
    display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px',
    background: '#F0FDF4', border: '1px solid #BBF7D0', borderRadius: 16,
  }}>
    <div style={{
      width: 32, height: 32, borderRadius: 999, background: '#DCFCE7',
      display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
    }}>
      <MIcon name="shield" size={16} color="#16A34A" sw={2}/>
    </div>
    <span style={{ fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 500, color: '#15803D', lineHeight: 1.35 }}>
      {children}
    </span>
  </div>
);

// ─── Partner Card ───
const PartnerCard = ({ name, destination, savings, locked, checkmark }) => (
  <div style={{
    background: '#F8FAFC', border: '1px solid var(--hairline)',
    borderRadius: 20, padding: 16, display: 'flex', alignItems: 'center', gap: 14,
  }}>
    <div style={{ position: 'relative', width: 52, height: 52, flexShrink: 0 }}>
      <div style={{
        width: 52, height: 52, borderRadius: 999,
        background: 'linear-gradient(135deg, #CBD5E1 0%, #94A3B8 100%)',
        filter: locked ? 'blur(6px)' : 'none',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 800, color: '#fff',
      }}>{name[0]}</div>
      {locked && (
        <div style={{
          position: 'absolute', inset: 0, borderRadius: 999,
          background: 'rgba(15,23,42,0.35)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <LockIcon size={18} color="#fff" sw={2}/>
        </div>
      )}
      {checkmark && (
        <div style={{
          position: 'absolute', bottom: -2, right: -2,
          width: 22, height: 22, borderRadius: 999, background: 'var(--success)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          border: '2px solid #F8FAFC',
        }}>
          <MIcon name="check" size={12} color="#fff" sw={3}/>
        </div>
      )}
    </div>
    <div style={{ flex: 1 }}>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontWeight: 700, color: 'var(--ink)' }}>{name}</div>
      <div style={{ fontFamily: 'var(--font-body)', fontSize: 12, color: 'var(--ink-muted)', marginTop: 2 }}>Heading to {destination}</div>
      <span style={{
        display: 'inline-block', marginTop: 6, padding: '4px 10px', borderRadius: 999,
        background: 'var(--success-soft)', fontFamily: 'var(--font-body)',
        fontSize: 11, fontWeight: 600, color: '#15803D',
      }}>Saves €{savings} together</span>
    </div>
    <div style={{
      width: 36, height: 36, borderRadius: 999,
      background: locked ? 'var(--surface-2)' : 'var(--success-soft)',
      border: `1px solid ${locked ? 'var(--hairline)' : '#BBF7D0'}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
    }}>
      {locked
        ? <LockIcon size={16} color="var(--ink-muted)" sw={2}/>
        : <MIcon name="check" size={16} color="#16A34A" sw={2.5}/>
      }
    </div>
  </div>
);

// ─── Value Grid ───
const ValueGrid = ({ destination, savings }) => (
  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
    <div style={{ background: 'var(--surface-2)', borderRadius: 18, padding: 14, textAlign: 'center' }}>
      <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--ink-subtle)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>Destination</div>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 15, fontWeight: 700, color: 'var(--ink)', marginTop: 4 }}>{destination}</div>
    </div>
    <div style={{ background: 'var(--success-soft)', borderRadius: 18, padding: 14, textAlign: 'center' }}>
      <div style={{ fontSize: 10, fontWeight: 600, color: '#15803D', letterSpacing: '0.08em', textTransform: 'uppercase' }}>You save</div>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 800, color: 'var(--success)', lineHeight: 1, fontFeatureSettings: '"tnum" 1', marginTop: 4 }}>€{savings}</div>
    </div>
  </div>
);

// ─── Nav Bar ───
const NavBar = ({ state }) => {
  const pillMap = {
    pending: { bg: 'var(--success-soft)', color: '#15803D', dot: 'var(--success)', text: 'Match found' },
    unlocked_waiting: { bg: 'var(--amber-soft)', color: '#92400E', dot: 'var(--amber)', text: 'Waiting for partner' },
    partner_waiting: { bg: '#DBEAFE', color: '#1D4ED8', dot: '#3B82F6', text: 'Partner unlocked' },
    expired: { bg: 'var(--error-soft)', color: '#B91C1C', dot: 'var(--error)', text: 'Match expired' },
  };
  const p = pillMap[state];
  return (
    <div style={{ padding: '16px 20px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'relative', zIndex: 2 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <div style={{ width: 8, height: 8, borderRadius: 999, background: 'var(--amber)' }}></div>
        <span style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 800, color: 'var(--ink)' }}>FLOT</span>
      </div>
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 6,
        padding: '6px 12px', borderRadius: 999,
        background: p.bg, fontFamily: 'var(--font-body)',
        fontSize: 12, fontWeight: 600, color: p.color,
      }}>
        <span style={{ width: 6, height: 6, borderRadius: 999, background: p.dot, animation: state === 'unlocked_waiting' ? 'countdownPulse 1.4s infinite' : 'none' }}></span>
        {p.text}
      </span>
    </div>
  );
};

// ─── Hero Area ───
const HeroArea = ({ state }) => {
  if (state === 'pending') {
    return (
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: 0.25 }}>
        <div style={{
          width: 220, height: 220, borderRadius: 999,
          background: 'radial-gradient(circle, rgba(220,252,231,0.9) 0%, transparent 70%)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <div style={{
            width: 72, height: 72, borderRadius: 999, background: 'var(--success)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff',
            boxShadow: '0 0 0 16px rgba(22,163,74,0.10)',
          }}>
            <MIcon name="check" size={36} sw={2.5}/>
          </div>
        </div>
      </div>
    );
  }
  if (state === 'unlocked_waiting') {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div style={{
          width: 96, height: 96, borderRadius: 999,
          background: 'linear-gradient(135deg, var(--amber-soft) 0%, #FDE68A 100%)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          animation: 'spinSlow 12s linear infinite',
          boxShadow: '0 0 0 8px rgba(245,158,11,0.08)',
        }}>
          <div style={{
            width: 64, height: 64, borderRadius: 999, background: 'var(--amber)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            animation: 'spinSlow 12s linear infinite reverse',
          }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0F172A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M20 6 9 17l-5-5" strokeDasharray="36" strokeDashoffset="0" style={{ animation: 'checkDraw 0.6s ease-out' }}/>
            </svg>
          </div>
        </div>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: 'var(--ink)' }}>You're unlocked!</div>
          <div style={{ fontSize: 13, color: 'var(--ink-muted)', marginTop: 4 }}>Waiting for your partner…</div>
        </div>
      </div>
    );
  }
  if (state === 'partner_waiting') {
    return (
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{
          width: 200, height: 200, borderRadius: 999,
          background: 'radial-gradient(circle, rgba(219,234,254,0.7) 0%, transparent 70%)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <div style={{
            width: 80, height: 80, borderRadius: 999,
            background: 'linear-gradient(135deg, #3B82F6 0%, #2563EB 100%)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff',
            boxShadow: '0 0 0 12px rgba(59,130,246,0.12)',
            animation: 'breathe 2s ease-in-out infinite',
          }}>
            <UnlockIcon size={36} color="#fff" sw={2.25}/>
          </div>
        </div>
      </div>
    );
  }
  // expired
  return (
    <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: 0.35 }}>
      <div style={{
        width: 200, height: 200, borderRadius: 999,
        background: 'radial-gradient(circle, rgba(254,226,226,0.7) 0%, transparent 70%)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{
          width: 72, height: 72, borderRadius: 999, background: 'var(--surface-2)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          border: '2px solid var(--hairline)',
        }}>
          <ClockIcon size={32} color="var(--ink-subtle)" sw={1.75}/>
        </div>
      </div>
    </div>
  );
};

// ─── Sheet Content by State ───
const PendingSheet = ({ t }) => (
  <>
    <div style={{ textAlign: 'center' }}>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 800, color: 'var(--ink)', letterSpacing: '-0.02em' }}>Match found!</div>
      <p style={{ fontSize: 14, color: 'var(--ink-muted)', marginTop: 6 }}>Unlock to meet your ride partner.</p>
    </div>
    <div style={{ marginTop: 16 }}>
      <ValueGrid destination={t.destination} savings={t.savings}/>
    </div>
    <div style={{ marginTop: 12 }}>
      <PartnerCard name={t.partnerName} destination={t.destination} savings={t.savings} locked/>
    </div>
    <div style={{ marginTop: 12 }}>
      <TrustBadge>Charged only when both unlock. Full refund guaranteed.</TrustBadge>
    </div>
    <button className="pressable" style={{
      marginTop: 14, width: '100%', height: 56, borderRadius: 24,
      background: 'var(--amber)', color: 'var(--ink)', border: 'none',
      fontFamily: 'var(--font-body)', fontSize: 16, fontWeight: 600,
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      boxShadow: '0 1px 3px rgba(245,158,11,0.25), 0 4px 16px rgba(245,158,11,0.20)',
      cursor: 'pointer',
    }}>
      <UnlockIcon size={20} sw={2}/>
      Unlock for €{t.price}
    </button>
    <div style={{ marginTop: 10, textAlign: 'center', fontSize: 11, color: 'var(--ink-subtle)' }}>
      One-time unlock · no subscription required
    </div>
  </>
);

const UnlockedWaitingSheet = ({ t }) => (
  <>
    <div style={{ textAlign: 'center' }}>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 24, fontWeight: 800, color: 'var(--ink)', letterSpacing: '-0.02em' }}>Waiting for {t.partnerName}</div>
      <p style={{ fontSize: 14, color: 'var(--ink-muted)', marginTop: 6 }}>We'll notify you when they unlock too.</p>
    </div>

    {/* Countdown */}
    <div style={{ display: 'flex', justifyContent: 'center', marginTop: 20 }}>
      <CircularCountdown minutes={t.countdownMin} seconds={t.countdownSec} color="var(--amber)"/>
    </div>

    <div style={{ marginTop: 20 }}>
      <PartnerCard name={t.partnerName} destination={t.destination} savings={t.savings} locked/>
    </div>

    {/* Status row */}
    <div style={{
      marginTop: 12, display: 'flex', gap: 8,
    }}>
      <div style={{
        flex: 1, display: 'flex', alignItems: 'center', gap: 8,
        padding: '10px 14px', borderRadius: 14,
        background: 'var(--success-soft)', border: '1px solid #BBF7D0',
      }}>
        <MIcon name="check" size={16} color="#16A34A" sw={2.5}/>
        <span style={{ fontSize: 13, fontWeight: 600, color: '#15803D' }}>You</span>
      </div>
      <div style={{
        flex: 1, display: 'flex', alignItems: 'center', gap: 8,
        padding: '10px 14px', borderRadius: 14,
        background: 'var(--surface-2)', border: '1px solid var(--hairline)',
      }}>
        <ClockIcon size={16} color="var(--ink-subtle)"/>
        <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink-subtle)' }}>{t.partnerName}</span>
      </div>
    </div>

    <div style={{ marginTop: 12 }}>
      <TrustBadge>If {t.partnerName} doesn't unlock in time, you won't be charged.</TrustBadge>
    </div>
  </>
);

const PartnerWaitingSheet = ({ t }) => (
  <>
    {/* Success banner */}
    <div style={{
      background: 'linear-gradient(135deg, #DBEAFE 0%, #EFF6FF 100%)',
      borderRadius: 18, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 12,
      border: '1px solid #BFDBFE',
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 999, background: '#3B82F6',
        display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
      }}>
        <MIcon name="check" size={18} color="#fff" sw={2.5}/>
      </div>
      <div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 15, fontWeight: 700, color: '#1E40AF' }}>{t.partnerName} already unlocked!</div>
        <div style={{ fontSize: 12, color: '#3B82F6', marginTop: 2 }}>Unlock now to connect instantly.</div>
      </div>
    </div>

    <div style={{ marginTop: 12 }}>
      <ValueGrid destination={t.destination} savings={t.savings}/>
    </div>

    <div style={{ marginTop: 12 }}>
      <PartnerCard name={t.partnerName} destination={t.destination} savings={t.savings} checkmark/>
    </div>

    {/* Countdown bar */}
    <div style={{ marginTop: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-muted)' }}>Time remaining</span>
        <span style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 700, color: 'var(--ink)', fontFeatureSettings: '"tnum" 1' }}>
          {String(t.countdownMin).padStart(2,'0')}:{String(t.countdownSec).padStart(2,'0')}
        </span>
      </div>
      <LinearCountdown minutes={t.countdownMin} seconds={t.countdownSec}/>
    </div>

    {/* Pulsing CTA */}
    <button className="pressable" style={{
      marginTop: 16, width: '100%', height: 56, borderRadius: 24,
      background: 'var(--amber)', color: 'var(--ink)', border: 'none',
      fontFamily: 'var(--font-body)', fontSize: 16, fontWeight: 700,
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      boxShadow: '0 1px 3px rgba(245,158,11,0.25), 0 4px 16px rgba(245,158,11,0.20)',
      cursor: 'pointer', animation: 'pulseGlow 2s ease-in-out infinite',
    }}>
      <UnlockIcon size={20} sw={2}/>
      Unlock now — {t.partnerName} is waiting!
    </button>
  </>
);

const ExpiredSheet = ({ t }) => (
  <>
    <div style={{ textAlign: 'center' }}>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 24, fontWeight: 800, color: 'var(--ink)', letterSpacing: '-0.02em' }}>Match expired</div>
      <p style={{ fontSize: 14, color: 'var(--ink-muted)', marginTop: 6, lineHeight: 1.5 }}>The unlock window has closed. Don't worry — no charge was applied to your account.</p>
    </div>

    {/* No charge card */}
    <div style={{
      marginTop: 16, padding: '16px 18px', borderRadius: 18,
      background: '#F0FDF4', border: '1px solid #BBF7D0',
      display: 'flex', alignItems: 'center', gap: 14,
    }}>
      <div style={{
        width: 44, height: 44, borderRadius: 999, background: '#DCFCE7',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <MIcon name="shield" size={22} color="#16A34A" sw={2}/>
      </div>
      <div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 16, fontWeight: 700, color: '#15803D' }}>No charge applied</div>
        <div style={{ fontSize: 12, color: '#16A34A', marginTop: 2 }}>Your payment authorization was released.</div>
      </div>
    </div>

    {/* Stats */}
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 14 }}>
      <div style={{ background: 'var(--surface-2)', borderRadius: 18, padding: 14, textAlign: 'center' }}>
        <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--ink-subtle)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>Route</div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 15, fontWeight: 700, color: 'var(--ink)', marginTop: 4 }}>{t.destination}</div>
      </div>
      <div style={{ background: 'var(--surface-2)', borderRadius: 18, padding: 14, textAlign: 'center' }}>
        <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--ink-subtle)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>Status</div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 15, fontWeight: 700, color: 'var(--error)', marginTop: 4 }}>Expired</div>
      </div>
    </div>

    {/* CTA */}
    <button className="pressable" style={{
      marginTop: 16, width: '100%', height: 56, borderRadius: 24,
      background: 'var(--ink)', color: '#fff', border: 'none',
      fontFamily: 'var(--font-body)', fontSize: 16, fontWeight: 600,
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      cursor: 'pointer',
    }}>
      <RefreshIcon size={20} color="#fff" sw={2}/>
      Search for a new match
    </button>
    <div style={{ marginTop: 10, textAlign: 'center', fontSize: 12, color: 'var(--ink-subtle)' }}>
      Same route, same savings
    </div>
  </>
);

// ─── Main App ───
const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const state = tweaks.state;

  const sheetMap = {
    pending: PendingSheet,
    unlocked_waiting: UnlockedWaitingSheet,
    partner_waiting: PartnerWaitingSheet,
    expired: ExpiredSheet,
  };
  const SheetContent = sheetMap[state];

  return (
    <>
      <div style={{
        width: 375, height: 812, background: 'var(--surface-0)',
        borderRadius: 44, border: '1.5px solid var(--hairline-strong)',
        overflow: 'hidden', position: 'relative', display: 'flex', flexDirection: 'column',
        boxShadow: '0 40px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04)',
      }}>
        <NavBar state={state}/>
        <HeroArea state={state}/>

        {/* Bottom Sheet */}
        <div style={{
          background: 'var(--surface-1)', borderRadius: '32px 32px 0 0',
          padding: '12px 20px 28px',
          boxShadow: 'var(--shadow-sheet)',
          animation: 'sheetUp 450ms cubic-bezier(0.22,0.61,0.36,1)',
          position: 'relative', zIndex: 5,
        }}>
          <div style={{ width: 40, height: 4, borderRadius: 999, background: 'rgba(15,23,42,0.18)', margin: '0 auto 16px' }}></div>
          <SheetContent t={tweaks}/>
        </div>
      </div>

      <TweaksPanel title="Match State">
        <TweakRadio label="State" value={tweaks.state} options={['pending', 'unlocked_waiting', 'partner_waiting', 'expired']} onChange={v => setTweak('state', v)}/>
        <TweakText label="Partner name" value={tweaks.partnerName} onChange={v => setTweak('partnerName', v)}/>
        <TweakText label="Savings (€)" value={tweaks.savings} onChange={v => setTweak('savings', v)}/>
        <TweakText label="Unlock price (€)" value={tweaks.price} onChange={v => setTweak('price', v)}/>
        <TweakSlider label="Countdown min" value={tweaks.countdownMin} min={0} max={15} step={1} onChange={v => setTweak('countdownMin', v)}/>
        <TweakSlider label="Countdown sec" value={tweaks.countdownSec} min={0} max={59} step={1} onChange={v => setTweak('countdownSec', v)}/>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
