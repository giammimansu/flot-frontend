<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLOT — Profile</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #E8E8ED; font-family: var(--font-body);
  }
  .phone {
    width: 375px; height: 812px; background: var(--surface-0);
    border-radius: 44px; border: 1.5px solid var(--hairline-strong);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
    box-shadow: 0 40px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .pressable { transition: transform 120ms var(--ease-out); cursor: pointer; }
  .pressable:active { transform: scale(0.97); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MalpensaComponents.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// Inline SVG icons
const icons = {
  bell: (s=18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
  globe: (s=18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>,
  creditCard: (s=18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  lock: (s=18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
  fileText: (s=18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 13H8"/><path d="M16 17H8"/><path d="M16 13h-2"/></svg>,
  headphones: (s=18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/></svg>,
  logOut: (s=18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
  pen: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>,
  star: (s=12) => <svg width={s} height={s} viewBox="0 0 24 24" fill="var(--amber)" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
};

const Toggle = ({ on, onChange }) => (
  <div className="pressable" onClick={onChange} style={{
    width:46, height:28, borderRadius:999, padding:2,
    background: on ? 'var(--success)' : 'var(--hairline-strong)',
    transition:'background 200ms var(--ease-out)',
    display:'flex', alignItems:'center', cursor:'pointer', flexShrink:0,
  }}>
    <div style={{
      width:24, height:24, borderRadius:999, background:'#fff',
      boxShadow:'0 1px 3px rgba(0,0,0,0.15)',
      transform: on ? 'translateX(18px)' : 'translateX(0)',
      transition:'transform 200ms var(--ease-out)',
    }}/>
  </div>
);

const Row = ({ icon, label, sub, right, onClick, danger }) => (
  <div className="pressable" onClick={onClick} style={{
    display:'flex', alignItems:'center', gap:14, padding:'14px 0',
    cursor: onClick ? 'pointer' : 'default',
  }}>
    <div style={{
      width:36, height:36, borderRadius:12, flexShrink:0,
      background: danger ? 'var(--error-soft)' : 'var(--surface-2)',
      display:'flex', alignItems:'center', justifyContent:'center',
      color: danger ? 'var(--error)' : 'var(--ink-muted)',
    }}>{icon}</div>
    <div style={{ flex:1, minWidth:0 }}>
      <div style={{ fontFamily:'var(--font-body)', fontSize:15, fontWeight:500, color: danger ? 'var(--error)' : 'var(--ink)' }}>{label}</div>
      {sub && <div style={{ fontFamily:'var(--font-body)', fontSize:12, color:'var(--ink-subtle)', marginTop:1 }}>{sub}</div>}
    </div>
    {right || <MIcon name="chevron-right" size={16} color="var(--ink-subtle)"/>}
  </div>
);

const Section = ({ title, children }) => (
  <div style={{ marginTop:18, padding:'0 20px' }}>
    <div style={{ fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, color:'var(--ink-subtle)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:4 }}>{title}</div>
    <div style={{
      background:'var(--surface-1)', border:'1px solid var(--hairline)',
      borderRadius:20, padding:'0 16px', boxShadow:'var(--shadow-card)',
    }}>
      {React.Children.map(children, (child, i) => (
        <React.Fragment key={i}>
          {child}
          {i < React.Children.count(children) - 1 && <div style={{ height:1, background:'var(--hairline)' }}/>}
        </React.Fragment>
      ))}
    </div>
  </div>
);

const Profile = () => {
  const [pushMatch, setPushMatch] = React.useState(true);
  const [pushReminder, setPushReminder] = React.useState(true);
  const [pushPromo, setPushPromo] = React.useState(false);

  return (
    <div className="phone">
      <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch' }}>

        {/* HEADER */}
        <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <button className="pressable" style={{
            width:40, height:40, borderRadius:999, border:'1px solid var(--hairline)',
            background:'var(--surface-1)', display:'flex', alignItems:'center', justifyContent:'center',
            color:'var(--ink)', padding:0, cursor:'pointer',
          }}>
            <MIcon name="chevron-left" size={20}/>
          </button>
          <span style={{ fontFamily:'var(--font-display)', fontSize:18, fontWeight:700, color:'var(--ink)' }}>Profilo</span>
          <div style={{ width:40 }}/>
        </div>

        {/* PROFILE CARD */}
        <div style={{
          margin:'16px 20px 0', padding:'20px', background:'var(--surface-1)',
          border:'1px solid var(--hairline)', borderRadius:24,
          boxShadow:'var(--shadow-card)', position:'relative',
        }}>
          <div style={{ display:'flex', alignItems:'center', gap:16 }}>
            {/* Avatar */}
            <div style={{ position:'relative' }}>
              <div style={{
                width:64, height:64, borderRadius:999,
                background:'linear-gradient(135deg, #BFDBFE, #93C5FD)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:'var(--font-display)', fontSize:22, fontWeight:800, color:'#1E40AF',
              }}>AL</div>
              <div style={{
                position:'absolute', bottom:-2, right:-2,
                width:22, height:22, borderRadius:999, background:'var(--amber)',
                border:'2px solid var(--surface-1)',
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>{icons.pen()}</div>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:'var(--font-display)', fontSize:20, fontWeight:800, color:'var(--ink)' }}>Alessandro L.</div>
              <div style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--ink-muted)', marginTop:2 }}>alessandro@live.it</div>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:6 }}>
                <span style={{
                  display:'inline-flex', alignItems:'center', gap:4,
                  padding:'3px 8px', borderRadius:999, background:'#EFF6FF', border:'1px solid #BFDBFE',
                }}>
                  <svg width="12" height="12" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="#3B82F6"/><path d="M5 8.5l2 2 4-4.5" stroke="#fff" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  <span style={{ fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, color:'#1D4ED8' }}>Verificato</span>
                </span>
                <span style={{ display:'inline-flex', alignItems:'center', gap:3, fontFamily:'var(--font-body)', fontSize:12, fontWeight:600, color:'var(--ink-muted)' }}>
                  {icons.star()} 4.9
                </span>
              </div>
            </div>
          </div>
          {/* Stats */}
          <div style={{ display:'flex', marginTop:16, gap:0 }}>
            {[
              { val:'5', label:'Viaggi' },
              { val:'€180', label:'Risparmiati' },
              { val:'100%', label:'Puntualità' },
            ].map((s, i) => (
              <React.Fragment key={i}>
                {i > 0 && <div style={{ width:1, background:'var(--hairline)', margin:'0 auto' }}/>}
                <div style={{ flex:1, textAlign:'center' }}>
                  <div style={{ fontFamily:'var(--font-display)', fontSize:18, fontWeight:800, color:'var(--ink)', fontFeatureSettings:'"tnum" 1' }}>{s.val}</div>
                  <div style={{ fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)', fontWeight:500, marginTop:1 }}>{s.label}</div>
                </div>
              </React.Fragment>
            ))}
          </div>
        </div>

        {/* NOTIFICATIONS */}
        <Section title="Notifiche">
          <Row icon={icons.bell()} label="Match trovato" sub="Quando troviamo un compagno"
            right={<Toggle on={pushMatch} onChange={() => setPushMatch(!pushMatch)}/>}/>
          <Row icon={icons.bell()} label="Promemoria viaggio" sub="30 min prima della partenza"
            right={<Toggle on={pushReminder} onChange={() => setPushReminder(!pushReminder)}/>}/>
          <Row icon={icons.bell()} label="Offerte e novità" sub="Promozioni e nuove rotte"
            right={<Toggle on={pushPromo} onChange={() => setPushPromo(!pushPromo)}/>}/>
        </Section>

        {/* ACCOUNT */}
        <Section title="Account">
          <Row icon={<MIcon name="shield" size={18}/>} label="Verifica identità" sub="Verificato · Aggiorna documenti"/>
          <Row icon={icons.creditCard()} label="Metodo di pagamento" sub="Visa •••• 4242"/>
          <Row icon={icons.globe()} label="Lingua" sub="Italiano" right={<span style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--ink-muted)', marginRight:4 }}>IT <MIcon name="chevron-right" size={14} color="var(--ink-subtle)"/></span>}/>
          <Row icon={icons.lock()} label="Privacy e sicurezza"/>
        </Section>

        {/* SUPPORT */}
        <Section title="Supporto">
          <Row icon={icons.headphones()} label="Centro assistenza"/>
          <Row icon={icons.fileText()} label="Termini e condizioni"/>
        </Section>

        {/* LOGOUT */}
        <div style={{ margin:'18px 20px 0', padding:'0' }}>
          <div style={{
            background:'var(--surface-1)', border:'1px solid var(--hairline)',
            borderRadius:20, padding:'0 16px', boxShadow:'var(--shadow-card)',
          }}>
            <Row icon={icons.logOut()} label="Esci dall'account" danger right={<span/>}/>
          </div>
        </div>

        {/* VERSION */}
        <div style={{ textAlign:'center', padding:'16px 20px 32px', fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)' }}>
          FLOT v1.0.0-beta · Made in Milano
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Profile/>);
</script>
</body>
</html>
