<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLOT — Identity Verification</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #E8E8ED; font-family: var(--font-body);
  }
  .phone {
    width: 375px; height: 812px; background: var(--surface-0);
    border-radius: 44px; border: 1.5px solid var(--hairline-strong);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
    box-shadow: 0 40px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
    animation: screenIn 350ms cubic-bezier(0.22,0.61,0.36,1) forwards;
  }
  .pressable { transition: transform 120ms var(--ease-out); cursor: pointer; }
  .pressable:active { transform: scale(0.97); }
  @keyframes screenIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MalpensaComponents.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const LockIcon = ({ size=16, color='currentColor', sw=2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
);

const UploadIcon = ({ size=24 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
);

const CameraIcon = ({ size=24 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/>
  </svg>
);

const CardIcon = ({ size=28 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="var(--ink-subtle)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
  </svg>
);

const UserIcon = ({ size=28 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="var(--ink-subtle)" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
  </svg>
);

const ShieldCheckIcon = ({ size=20, color='currentColor' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
    <path d="m9 12 2 2 4-4"/>
  </svg>
);

const StepPill = ({ num, done }) => (
  <div style={{
    width:28, height:28, borderRadius:999,
    background: done ? 'var(--success)' : 'var(--surface-2)',
    display:'flex', alignItems:'center', justifyContent:'center',
  }}>
    {done
      ? <MIcon name="check" size={14} color="#fff" sw={2.5}/>
      : <span style={{ fontFamily:'var(--font-display)', fontSize:13, fontWeight:700, color:'var(--ink-subtle)' }}>{num}</span>
    }
  </div>
);

const UploadZone = ({ icon, text, sub }) => (
  <div style={{
    marginTop:14, border:'1.5px dashed var(--hairline-strong)',
    borderRadius:16, padding:20, background:'var(--surface-0)',
    display:'flex', flexDirection:'column', alignItems:'center', gap:8,
  }}>
    <div style={{ color:'var(--ink-subtle)' }}>{icon}</div>
    <span style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:500, color:'var(--ink-muted)' }}>{text}</span>
    <span style={{ fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)' }}>{sub}</span>
  </div>
);

const UploadedPreview = ({ name, sub }) => (
  <div style={{
    marginTop:14, borderRadius:12, background:'var(--surface-2)',
    display:'flex', alignItems:'center', gap:12, padding:'12px 14px',
    animation:'fadeUp 300ms cubic-bezier(0.22,0.61,0.36,1)',
  }}>
    <div style={{
      width:36, height:36, borderRadius:999, background:'var(--success-soft)',
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
    }}>
      <MIcon name="check" size={18} color="var(--success)" sw={2.5}/>
    </div>
    <div>
      <div style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, color:'var(--ink)' }}>{name}</div>
      <div style={{ fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-muted)', marginTop:1 }}>{sub}</div>
    </div>
  </div>
);

const IdentityVerification = () => {
  const [s1, setS1] = React.useState(false);
  const [s2, setS2] = React.useState(false);

  return (
    <div className="phone">
      <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch' }}>

        {/* TOP NAV */}
        <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between', position:'relative' }}>
          <button className="pressable" style={{
            width:40, height:40, borderRadius:999, border:'1px solid var(--hairline)',
            background:'var(--surface-1)', display:'flex', alignItems:'center', justifyContent:'center',
            color:'var(--ink)', padding:0, cursor:'pointer',
          }}>
            <MIcon name="chevron-left" size={20}/>
          </button>
          {/* Progress dots */}
          <div style={{ position:'absolute', left:'50%', top:'50%', transform:'translate(-50%,-50%)', display:'flex', gap:6, alignItems:'center', marginTop:8 }}>
            <div style={{ width:8, height:8, borderRadius:999, background:'var(--success)' }}></div>
            <div style={{ width:24, height:6, borderRadius:999, background:'var(--amber)' }}></div>
            <div style={{ width:8, height:8, borderRadius:999, background:'var(--surface-2)' }}></div>
          </div>
          <button style={{ border:'none', background:'transparent', fontFamily:'var(--font-body)', fontSize:13, fontWeight:500, color:'var(--ink-subtle)', cursor:'pointer' }}>Skip for now</button>
        </div>

        {/* HERO */}
        <div style={{ padding:'24px 20px 0' }}>
          <div style={{ fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, color:'var(--ink-subtle)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:10 }}>Identity verification · Step 2 of 3</div>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:32, fontWeight:800, color:'var(--ink)', letterSpacing:'-0.025em', lineHeight:1.05, margin:0 }}>Verify your identity.</h1>
          <p style={{ fontFamily:'var(--font-body)', fontSize:14, color:'var(--ink-muted)', lineHeight:1.55, marginTop:8 }}>We need to confirm you are who you say you are. Your documents are encrypted and never shared.</p>
        </div>

        {/* TRUST STRIP */}
        <div style={{
          margin:'16px 20px 0', padding:'12px 14px',
          background:'var(--surface-1)', border:'1px solid var(--hairline)', borderRadius:16,
          display:'flex', alignItems:'center', gap:10,
        }}>
          <div style={{ width:32, height:32, borderRadius:999, background:'#EFF6FF', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <LockIcon size={16} color="#3B82F6"/>
          </div>
          <span style={{ fontFamily:'var(--font-body)', fontSize:12, color:'var(--ink-muted)', lineHeight:1.4 }}>256-bit encrypted · GDPR compliant · deleted after review</span>
        </div>

        {/* STEP CARDS */}
        <div style={{ margin:'20px 20px 0', display:'flex', flexDirection:'column', gap:12 }}>

          {/* STEP 1 */}
          <div className="pressable" onClick={() => !s1 && setS1(true)} style={{
            background: s1 ? 'rgba(220,252,231,0.15)' : 'var(--surface-1)',
            border: s1 ? '1.5px solid rgba(22,163,74,0.40)' : '1.5px solid var(--hairline)',
            borderRadius:24, padding:20, boxShadow:'var(--shadow-card)',
            position:'relative', overflow:'hidden',
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
              <StepPill num="01" done={s1}/>
              <span style={{
                padding:'4px 10px', borderRadius:999,
                background: s1 ? 'var(--success-soft)' : 'var(--error-soft)',
                fontFamily:'var(--font-body)', fontSize:11, fontWeight:600,
                color: s1 ? '#15803D' : '#DC2626',
              }}>{s1 ? 'Uploaded' : 'Required'}</span>
            </div>
            {!s1 && <>
              <div style={{ display:'flex', justifyContent:'center', marginBottom:14 }}>
                <div style={{ width:56, height:56, borderRadius:999, background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <CardIcon/>
                </div>
              </div>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontFamily:'var(--font-display)', fontSize:18, fontWeight:700, color:'var(--ink)' }}>Government ID</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--ink-muted)', marginTop:4 }}>Passport, ID card or driving licence.</div>
              </div>
              <div style={{ height:1, background:'var(--hairline)', margin:'16px 0' }}></div>
              <div style={{ display:'flex', gap:6, justifyContent:'center' }}>
                {['Passport','ID card','Licence'].map(d => (
                  <span key={d} style={{ padding:'4px 10px', borderRadius:999, background:'var(--surface-2)', fontFamily:'var(--font-body)', fontSize:11, fontWeight:500, color:'var(--ink-muted)' }}>{d}</span>
                ))}
              </div>
              <UploadZone icon={<UploadIcon/>} text="Tap to photograph or upload" sub="JPG, PNG or PDF · max 10MB"/>
            </>}
            {s1 && <UploadedPreview name="passport_scan.jpg" sub="3.2 MB · Ready for review"/>}
          </div>

          {/* STEP 2 */}
          <div className="pressable" onClick={() => s1 && !s2 && setS2(true)} style={{
            background: s2 ? 'rgba(220,252,231,0.15)' : 'var(--surface-1)',
            border: s2 ? '1.5px solid rgba(22,163,74,0.40)' : '1.5px solid var(--hairline)',
            borderRadius:24, padding:20, boxShadow:'var(--shadow-card)',
            position:'relative', overflow:'hidden',
            opacity: !s1 ? 0.6 : 1, transition:'opacity 300ms var(--ease-out)',
            pointerEvents: !s1 ? 'none' : 'auto',
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
              <StepPill num="02" done={s2}/>
              <span style={{
                padding:'4px 10px', borderRadius:999,
                background: s2 ? 'var(--success-soft)' : (!s1 ? 'var(--amber-soft)' : 'var(--error-soft)'),
                fontFamily:'var(--font-body)', fontSize:11, fontWeight:600,
                color: s2 ? '#15803D' : (!s1 ? '#92400E' : '#DC2626'),
              }}>{s2 ? 'Uploaded' : (!s1 ? 'Do after step 1' : 'Required')}</span>
            </div>
            {!s2 && <>
              <div style={{ display:'flex', justifyContent:'center', marginBottom:14, position:'relative' }}>
                <div style={{ width:56, height:56, borderRadius:999, background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
                  <UserIcon/>
                  <div style={{ position:'absolute', bottom:-2, right:-2, width:20, height:20, borderRadius:999, background:'var(--surface-1)', border:'1.5px solid var(--hairline)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <CameraIcon size={10}/>
                  </div>
                </div>
              </div>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontFamily:'var(--font-display)', fontSize:18, fontWeight:700, color:'var(--ink)' }}>Selfie check</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--ink-muted)', marginTop:4 }}>A quick photo to match your face to your ID.</div>
              </div>
              <div style={{ height:1, background:'var(--hairline)', margin:'16px 0' }}></div>
              <div style={{ display:'flex', gap:6, justifyContent:'center' }}>
                {['Good lighting','Face forward','No sunglasses'].map(d => (
                  <span key={d} style={{ padding:'4px 10px', borderRadius:999, background:'var(--surface-2)', fontFamily:'var(--font-body)', fontSize:11, fontWeight:500, color:'var(--ink-muted)' }}>{d}</span>
                ))}
              </div>
              <UploadZone icon={<CameraIcon/>} text="Take a selfie or upload a photo" sub="Front-facing, well lit · JPG or PNG"/>
            </>}
            {s2 && <UploadedPreview name="selfie_check.jpg" sub="2.1 MB · Face matched successfully"/>}
          </div>
        </div>

        {/* PRIVACY NOTE */}
        <div style={{ margin:'16px 20px 0', display:'flex', alignItems:'flex-start', gap:10, padding:'0 4px' }}>
          <div style={{ flexShrink:0, marginTop:2 }}><MIcon name="info" size={14} color="var(--ink-subtle)"/></div>
          <span style={{ fontFamily:'var(--font-body)', fontSize:12, color:'var(--ink-subtle)', lineHeight:1.5 }}>Your documents are reviewed by our trust team within 24 hours and permanently deleted after verification. We never store copies.</span>
        </div>

        <div style={{ height:120 }}></div>
      </div>

      {/* CTA */}
      <div style={{
        position:'absolute', bottom:0, left:0, right:0,
        padding:'12px 20px 28px',
        background:'linear-gradient(transparent, #FAFAFA 24px)',
      }}>
        <button className="pressable" disabled={!s1} style={{
          width:'100%', height:56, borderRadius:24,
          background:'var(--amber)', color:'var(--ink)', border:'none',
          fontFamily:'var(--font-body)', fontSize:16, fontWeight:600,
          display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          boxShadow:'0 1px 3px rgba(245,158,11,0.25), 0 4px 16px rgba(245,158,11,0.20)',
          opacity: s1 ? 1 : 0.4, cursor: s1 ? 'pointer' : 'not-allowed',
        }}>
          <ShieldCheckIcon size={20}/> Submit for verification
        </button>
        <div style={{ marginTop:10, textAlign:'center', fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)' }}>Verification usually completes within 24 hours.</div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<IdentityVerification/>);
</script>
</body>
</html>
