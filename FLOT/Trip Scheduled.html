<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLOT — Trip Scheduled</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #E8E8ED; font-family: var(--font-body);
  }
  .phone {
    width: 375px; height: 812px; background: var(--surface-0);
    border-radius: 44px; border: 1.5px solid var(--hairline-strong);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
    box-shadow: 0 40px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .pressable { transition: transform 120ms var(--ease-out); cursor: pointer; }
  .pressable:active { transform: scale(0.97); }
  @keyframes checkPop {
    0%   { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes ringGrow {
    0%   { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes confetti1 { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-60px) rotate(180deg);opacity:0} }
  @keyframes confetti2 { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-50px) rotate(-120deg);opacity:0} }
  @keyframes confetti3 { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-70px) rotate(200deg);opacity:0} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MalpensaComponents.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const BellIcon = ({ size=20 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
  </svg>
);

const CalendarIcon = ({ size=16 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
  </svg>
);

const ClockIcon = ({ size=16 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
  </svg>
);

const ListIcon = ({ size=20 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
    <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
  </svg>
);

const TrashIcon = ({ size=16 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
  </svg>
);

// Trip data
const trip = {
  id: 'FLT-2026-04301',
  from: 'Terminal 1',
  to: 'Milano Centrale',
  date: 'Mer 30 Apr 2026',
  time: '14:30 – 15:20',
  passengers: 2,
  luggage: 1,
  baseFare: 120,
  yourShare: 60,
};

const ConfettiDot = ({ color, left, delay, anim }) => (
  <div style={{
    position:'absolute', left, top:'50%',
    width:6, height:6, borderRadius:2,
    background:color,
    animation:`${anim} 1.2s ${delay}ms cubic-bezier(0.22,0.61,0.36,1) forwards`,
    opacity:0,
  }}/>
);

const TripScheduled = () => {
  const [pushPrompt, setPushPrompt] = React.useState(true);

  return (
    <div className="phone">
      <div style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch', display:'flex', flexDirection:'column' }}>

        {/* TOP NAV */}
        <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <div style={{ width:8, height:8, borderRadius:999, background:'var(--amber)' }}></div>
            <span style={{ fontFamily:'var(--font-display)', fontSize:20, fontWeight:800, color:'var(--ink)' }}>FLOT</span>
          </div>
          <span style={{
            padding:'5px 10px', borderRadius:999, background:'var(--surface-2)',
            fontFamily:'var(--font-body)', fontSize:11, fontWeight:600,
            color:'var(--ink-muted)', fontFeatureSettings:'"tnum" 1',
          }}>{trip.id}</span>
        </div>

        {/* SUCCESS ANIMATION */}
        <div style={{
          display:'flex', alignItems:'center', justifyContent:'center',
          padding:'32px 0 8px', position:'relative',
        }}>
          {/* Outer ring */}
          <div style={{
            width:120, height:120, borderRadius:999,
            border:'2px solid rgba(22,163,74,0.15)',
            display:'flex', alignItems:'center', justifyContent:'center',
            position:'relative',
            animation:'ringGrow 500ms cubic-bezier(0.22,0.61,0.36,1) forwards',
          }}>
            {/* Inner circle */}
            <div style={{
              width:88, height:88, borderRadius:999, background:'var(--success)',
              display:'flex', alignItems:'center', justifyContent:'center', color:'#fff',
              boxShadow:'0 0 0 14px rgba(22,163,74,0.10), 0 12px 40px rgba(22,163,74,0.25)',
              animation:'checkPop 600ms 150ms cubic-bezier(0.22,0.61,0.36,1) both',
            }}>
              <MIcon name="check" size={42} sw={2.5}/>
            </div>
            {/* Confetti */}
            <ConfettiDot color="var(--amber)" left="8%" delay={300} anim="confetti1"/>
            <ConfettiDot color="var(--success)" left="85%" delay={400} anim="confetti2"/>
            <ConfettiDot color="#3B82F6" left="15%" delay={500} anim="confetti3"/>
            <ConfettiDot color="var(--amber)" left="78%" delay={350} anim="confetti1"/>
            <ConfettiDot color="#DC2626" left="50%" delay={450} anim="confetti2"/>
          </div>
        </div>

        {/* HEADLINE */}
        <div style={{
          textAlign:'center', padding:'0 20px',
          animation:'fadeUp 400ms 200ms cubic-bezier(0.22,0.61,0.36,1) both',
        }}>
          <h1 style={{
            fontFamily:'var(--font-display)', fontSize:28, fontWeight:800,
            color:'var(--ink)', letterSpacing:'-0.02em', margin:0,
          }}>Viaggio prenotato!</h1>
          <p style={{
            fontFamily:'var(--font-body)', fontSize:14, color:'var(--ink-muted)',
            lineHeight:1.5, marginTop:6,
          }}>Ti cercheremo un compagno di viaggio il giorno stesso. Riceverai una notifica appena troviamo un match.</p>
        </div>

        {/* TRIP SUMMARY CARD */}
        <div style={{
          margin:'18px 20px 0', background:'var(--surface-1)', border:'1px solid var(--hairline)',
          borderRadius:24, boxShadow:'var(--shadow-card)', overflow:'hidden',
          animation:'fadeUp 400ms 350ms cubic-bezier(0.22,0.61,0.36,1) both',
        }}>
          {/* Route */}
          <div style={{ padding:'18px 18px 14px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              {/* From dot line To */}
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2, flexShrink:0 }}>
                <div style={{ width:10, height:10, borderRadius:999, border:'2.5px solid var(--amber)' }}></div>
                <div style={{ width:1.5, height:28, background:'var(--hairline)' }}></div>
                <div style={{ width:10, height:10, borderRadius:999, background:'var(--amber)' }}></div>
              </div>
              <div style={{ flex:1 }}>
                <div>
                  <div style={{ fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, color:'var(--ink-subtle)', letterSpacing:'0.06em', textTransform:'uppercase' }}>Da</div>
                  <div style={{ fontFamily:'var(--font-display)', fontSize:17, fontWeight:700, color:'var(--ink)', marginTop:1 }}>{trip.from}</div>
                </div>
                <div style={{ marginTop:10 }}>
                  <div style={{ fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, color:'var(--ink-subtle)', letterSpacing:'0.06em', textTransform:'uppercase' }}>A</div>
                  <div style={{ fontFamily:'var(--font-display)', fontSize:17, fontWeight:700, color:'var(--ink)', marginTop:1 }}>{trip.to}</div>
                </div>
              </div>
            </div>
          </div>

          {/* Divider */}
          <div style={{ height:1, background:'var(--hairline)', margin:'0 18px' }}></div>

          {/* Details grid */}
          <div style={{ padding:'14px 18px 16px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:28, height:28, borderRadius:10, background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-muted)', flexShrink:0 }}>
                <CalendarIcon/>
              </div>
              <div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)', fontWeight:500 }}>Data</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, color:'var(--ink)' }}>{trip.date}</div>
              </div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:28, height:28, borderRadius:10, background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-muted)', flexShrink:0 }}>
                <ClockIcon/>
              </div>
              <div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)', fontWeight:500 }}>Orario</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, color:'var(--ink)' }}>{trip.time}</div>
              </div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:28, height:28, borderRadius:10, background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-muted)', flexShrink:0 }}>
                <MIcon name="users" size={14}/>
              </div>
              <div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)', fontWeight:500 }}>Passeggeri</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, color:'var(--ink)' }}>{trip.passengers}</div>
              </div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ width:28, height:28, borderRadius:10, background:'var(--surface-2)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-muted)', flexShrink:0 }}>
                <MIcon name="luggage" size={14}/>
              </div>
              <div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)', fontWeight:500 }}>Bagagli</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, color:'var(--ink)' }}>{trip.luggage}</div>
              </div>
            </div>
          </div>

          {/* Savings strip */}
          <div style={{
            padding:'12px 18px', background:'var(--success-soft)',
            display:'flex', alignItems:'center', justifyContent:'space-between',
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <MIcon name="sparkles" size={16} color="var(--success)" sw={2}/>
              <span style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, color:'#15803D' }}>Risparmio stimato</span>
            </div>
            <span style={{
              fontFamily:'var(--font-display)', fontSize:20, fontWeight:800,
              color:'var(--success)', fontFeatureSettings:'"tnum" 1',
            }}>€{trip.baseFare - trip.yourShare}</span>
          </div>
        </div>

        {/* PUSH NOTIFICATION PROMPT */}
        {pushPrompt && (
          <div style={{
            margin:'14px 20px 0', padding:'16px 18px',
            background:'var(--surface-1)', border:'1px solid var(--hairline)',
            borderRadius:20, boxShadow:'var(--shadow-card)',
            animation:'fadeUp 400ms 500ms cubic-bezier(0.22,0.61,0.36,1) both',
          }}>
            <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
              <div style={{
                width:40, height:40, borderRadius:14, background:'var(--amber-soft)',
                display:'flex', alignItems:'center', justifyContent:'center', color:'#92400E', flexShrink:0,
              }}>
                <BellIcon/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:'var(--font-display)', fontSize:16, fontWeight:700, color:'var(--ink)' }}>Attiva le notifiche</div>
                <p style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--ink-muted)', lineHeight:1.45, margin:'4px 0 0' }}>
                  Ti avviseremo appena troviamo un compagno di viaggio e quando sarà ora di partire.
                </p>
              </div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginTop:14 }}>
              <button className="pressable" onClick={() => setPushPrompt(false)} style={{
                height:44, borderRadius:14, background:'var(--amber)', color:'var(--ink)', border:'none',
                fontFamily:'var(--font-body)', fontSize:14, fontWeight:600, cursor:'pointer',
                display:'flex', alignItems:'center', justifyContent:'center', gap:6,
                boxShadow:'0 1px 3px rgba(245,158,11,0.25)',
              }}>
                <BellIcon size={16}/> Attiva
              </button>
              <button className="pressable" onClick={() => setPushPrompt(false)} style={{
                height:44, borderRadius:14, background:'var(--surface-2)', color:'var(--ink-muted)', border:'none',
                fontFamily:'var(--font-body)', fontSize:14, fontWeight:500, cursor:'pointer',
              }}>Non ora</button>
            </div>
          </div>
        )}

        {/* WHAT HAPPENS NEXT */}
        <div style={{
          margin:'14px 20px 0', padding:'16px 18px',
          background:'var(--surface-1)', border:'1px solid var(--hairline)',
          borderRadius:20,
          animation:'fadeUp 400ms 600ms cubic-bezier(0.22,0.61,0.36,1) both',
        }}>
          <div style={{ fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, color:'var(--ink-subtle)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:12 }}>Cosa succede ora</div>
          {[
            { num:'1', text:'Cercheremo compagni diretti a Milano Centrale' },
            { num:'2', text:'Riceverai una notifica push con il match' },
            { num:'3', text:'Vi incontrerete all\'uscita indicata' },
          ].map((s, i, a) => (
            <div key={i} style={{
              display:'flex', gap:12, alignItems:'flex-start',
              padding:'10px 0',
              borderBottom: i < a.length - 1 ? '1px solid var(--surface-2)' : 'none',
            }}>
              <div style={{
                width:24, height:24, borderRadius:999, background:'var(--surface-2)',
                display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
                fontFamily:'var(--font-display)', fontSize:12, fontWeight:700, color:'var(--ink-subtle)',
              }}>{s.num}</div>
              <span style={{ fontFamily:'var(--font-body)', fontSize:14, color:'var(--ink)', lineHeight:1.45 }}>{s.text}</span>
            </div>
          ))}
        </div>

        {/* spacer */}
        <div style={{ height:140 }}></div>
      </div>

      {/* ACTION AREA */}
      <div style={{
        position:'absolute', bottom:0, left:0, right:0,
        padding:'12px 20px 28px',
        background:'linear-gradient(transparent, #FAFAFA 24px)',
      }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
          <button className="pressable" style={{
            height:52, borderRadius:20, background:'var(--ink)', color:'#fff', border:'none',
            fontFamily:'var(--font-body)', fontSize:14, fontWeight:600, cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', gap:6,
          }}>
            <ListIcon size={18}/> I miei viaggi
          </button>
          <button className="pressable" style={{
            height:52, borderRadius:20, background:'var(--surface-1)', color:'var(--ink)',
            border:'1.5px solid var(--ink)',
            fontFamily:'var(--font-body)', fontSize:14, fontWeight:600, cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center', gap:6,
          }}>
            <MIcon name="plus" size={18}/> Nuovo viaggio
          </button>
        </div>
        <button className="pressable" style={{
          width:'100%', height:40, borderRadius:12,
          background:'transparent', border:'none',
          fontFamily:'var(--font-body)', fontSize:13, fontWeight:500,
          color:'var(--error)', cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center', gap:6,
        }}>
          <TrashIcon size={14}/> Cancella prenotazione
        </button>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<TripScheduled/>);
</script>
</body>
</html>
