<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLOT — Match Result (Locked)</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #E8E8ED; font-family: var(--font-body);
  }
  .phone {
    width: 375px; height: 812px; background: var(--surface-0);
    border-radius: 44px; border: 1.5px solid var(--hairline-strong);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
    box-shadow: 0 40px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .pressable { transition: transform 120ms var(--ease-out); cursor: pointer; }
  .pressable:active { transform: scale(0.97); }
  @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  @keyframes matchPop { 0%{opacity:0;transform:scale(.88)} 70%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes modalPop { from{opacity:0;transform:scale(.90) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MalpensaComponents.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const LockIcon = ({ size = 24, color = 'currentColor', sw = 2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
);

const UnlockIcon = ({ size = 24, color = 'currentColor', sw = 2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
  </svg>
);

const ComingSoonModal = ({ onClose }) => (
  <div onClick={onClose} style={{
    position:'absolute', inset:0, zIndex:60,
    background:'rgba(15,23,42,0.45)', display:'flex',
    alignItems:'center', justifyContent:'center', padding:24,
    animation:'fadeIn 200ms',
  }}>
    <div onClick={e => e.stopPropagation()} style={{
      background:'var(--surface-1)', borderRadius:28, padding:'32px 24px 24px',
      width:'100%', maxWidth:320,
      boxShadow:'0 24px 64px rgba(15,23,42,0.22)',
      animation:'modalPop 300ms cubic-bezier(0.22,0.61,0.36,1)',
    }}>
      {/* Icon */}
      <div style={{ display:'flex', justifyContent:'center', marginBottom:20 }}>
        <div style={{
          width:64, height:64, borderRadius:999, background:'var(--amber-soft)',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          <div style={{
            width:48, height:48, borderRadius:999, background:'var(--amber)',
            display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink)',
          }}>
            <LockIcon size={24} sw={2}/>
          </div>
        </div>
      </div>
      <div style={{ textAlign:'center' }}>
        <span style={{
          display:'inline-block', padding:'5px 12px', borderRadius:999,
          background:'var(--surface-2)', fontFamily:'var(--font-body)',
          fontSize:11, fontWeight:600, color:'var(--ink-subtle)', marginBottom:12,
        }}>Beta</span>
        <div style={{ fontFamily:'var(--font-display)', fontSize:26, fontWeight:800, color:'var(--ink)', letterSpacing:'-0.02em' }}>Coming soon</div>
        <p style={{ fontFamily:'var(--font-body)', fontSize:14, color:'var(--ink-muted)', lineHeight:1.55, marginTop:8 }}>
          Unlocking match details will be available when FLOT launches publicly. During beta, all matches are free.
        </p>
      </div>
      <div style={{ height:1, background:'var(--hairline)', margin:'20px 0' }}></div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, textAlign:'center' }}>
        <div>
          <div style={{ fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, color:'var(--ink-subtle)', letterSpacing:'0.06em', textTransform:'uppercase' }}>Beta access</div>
          <div style={{ fontFamily:'var(--font-display)', fontSize:16, fontWeight:700, color:'var(--success)', marginTop:4 }}>Free</div>
        </div>
        <div>
          <div style={{ fontFamily:'var(--font-body)', fontSize:11, fontWeight:600, color:'var(--ink-subtle)', letterSpacing:'0.06em', textTransform:'uppercase' }}>Launch</div>
          <div style={{ fontFamily:'var(--font-display)', fontSize:16, fontWeight:700, color:'var(--ink)', marginTop:4 }}>Q3 2025</div>
        </div>
      </div>
      <button className="pressable" onClick={onClose} style={{
        marginTop:20, width:'100%', height:52, borderRadius:16,
        background:'var(--ink)', color:'#fff', border:'none',
        fontFamily:'var(--font-body)', fontSize:15, fontWeight:600, cursor:'pointer',
      }}>Got it, thanks</button>
    </div>
  </div>
);

const MatchLocked = () => {
  const [modal, setModal] = React.useState(false);

  return (
    <div className="phone">
      {/* TOP NAV */}
      <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between', position:'relative', zIndex:2 }}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:8, height:8, borderRadius:999, background:'var(--amber)' }}></div>
          <span style={{ fontFamily:'var(--font-display)', fontSize:20, fontWeight:800, color:'var(--ink)' }}>FLOT</span>
        </div>
        <span style={{
          display:'inline-flex', alignItems:'center', gap:6,
          padding:'6px 12px', borderRadius:999,
          background:'var(--success-soft)', fontFamily:'var(--font-body)',
          fontSize:12, fontWeight:600, color:'#15803D',
        }}>
          <span style={{ width:6, height:6, borderRadius:999, background:'var(--success)' }}></span>
          Match found
        </span>
      </div>

      {/* SUCCESS GLOW */}
      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', opacity:0.25 }}>
        <div style={{
          width:220, height:220, borderRadius:999,
          background:'radial-gradient(circle, rgba(220,252,231,0.9) 0%, transparent 70%)',
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          <div style={{
            width:72, height:72, borderRadius:999, background:'var(--success)',
            display:'flex', alignItems:'center', justifyContent:'center', color:'#fff',
            boxShadow:'0 0 0 16px rgba(22,163,74,0.10)',
          }}>
            <MIcon name="check" size={36} sw={2.5}/>
          </div>
        </div>
      </div>

      {/* BOTTOM SHEET */}
      <div style={{
        background:'var(--surface-1)', borderRadius:'32px 32px 0 0',
        padding:'12px 20px 28px',
        boxShadow:'var(--shadow-sheet)',
        animation:'sheetUp 450ms cubic-bezier(0.22,0.61,0.36,1)',
        position:'relative', zIndex:5,
      }}>
        <div style={{ width:40, height:4, borderRadius:999, background:'rgba(15,23,42,0.18)', margin:'0 auto 16px' }}></div>

        {/* Celebration */}
        <div style={{ textAlign:'center', animation:'matchPop 600ms cubic-bezier(0.22,0.61,0.36,1)' }}>
          <div style={{ fontFamily:'var(--font-display)', fontSize:28, fontWeight:800, color:'var(--ink)', letterSpacing:'-0.02em' }}>Match found!</div>
          <p style={{ fontFamily:'var(--font-body)', fontSize:14, color:'var(--ink-muted)', marginTop:6 }}>Unlock to meet your ride partner.</p>
        </div>

        {/* Value grid */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginTop:16 }}>
          <div style={{ background:'var(--surface-2)', borderRadius:18, padding:14, textAlign:'center' }}>
            <div style={{ fontFamily:'var(--font-body)', fontSize:10, fontWeight:600, color:'var(--ink-subtle)', letterSpacing:'0.08em', textTransform:'uppercase' }}>Destination</div>
            <div style={{ fontFamily:'var(--font-display)', fontSize:15, fontWeight:700, color:'var(--ink)', marginTop:4 }}>Milano Centrale</div>
          </div>
          <div style={{ background:'var(--success-soft)', borderRadius:18, padding:14, textAlign:'center' }}>
            <div style={{ fontFamily:'var(--font-body)', fontSize:10, fontWeight:600, color:'#15803D', letterSpacing:'0.08em', textTransform:'uppercase' }}>You save</div>
            <div style={{ fontFamily:'var(--font-display)', fontSize:28, fontWeight:800, color:'var(--success)', lineHeight:1, fontFeatureSettings:'"tnum" 1', marginTop:4 }}>€60.00</div>
          </div>
        </div>

        {/* Partner card locked */}
        <div style={{
          marginTop:12, background:'#F8FAFC', border:'1px solid var(--hairline)',
          borderRadius:20, padding:16, display:'flex', alignItems:'center', gap:14,
          position:'relative', overflow:'hidden',
        }}>
          {/* Blurred avatar */}
          <div style={{ position:'relative', width:52, height:52, flexShrink:0 }}>
            <div style={{
              width:52, height:52, borderRadius:999,
              background:'linear-gradient(135deg, #CBD5E1 0%, #94A3B8 100%)',
              filter:'blur(6px)', display:'flex', alignItems:'center', justifyContent:'center',
              fontFamily:'var(--font-display)', fontSize:20, fontWeight:800, color:'#fff',
            }}>M</div>
            <div style={{
              position:'absolute', inset:0, borderRadius:999,
              background:'rgba(15,23,42,0.35)',
              display:'flex', alignItems:'center', justifyContent:'center',
            }}>
              <LockIcon size={18} color="#fff" sw={2}/>
            </div>
          </div>
          {/* Info */}
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--font-display)', fontSize:18, fontWeight:700, color:'var(--ink)' }}>Marco</div>
            <div style={{ fontFamily:'var(--font-body)', fontSize:12, color:'var(--ink-muted)', marginTop:2 }}>Heading to Milano Centrale</div>
            <span style={{
              display:'inline-block', marginTop:6, padding:'4px 10px', borderRadius:999,
              background:'var(--success-soft)', fontFamily:'var(--font-body)',
              fontSize:11, fontWeight:600, color:'#15803D',
            }}>Saves €60.00 together</span>
          </div>
          {/* Lock badge */}
          <div style={{
            width:36, height:36, borderRadius:999, background:'var(--surface-2)',
            border:'1px solid var(--hairline)', display:'flex', alignItems:'center',
            justifyContent:'center', flexShrink:0,
          }}>
            <LockIcon size={16} color="var(--ink-muted)" sw={2}/>
          </div>
        </div>

        {/* Unlock CTA */}
        <button className="pressable" onClick={() => setModal(true)} style={{
          marginTop:14, width:'100%', height:56, borderRadius:24,
          background:'var(--amber)', color:'var(--ink)', border:'none',
          fontFamily:'var(--font-body)', fontSize:16, fontWeight:600,
          display:'flex', alignItems:'center', justifyContent:'center', gap:8,
          boxShadow:'0 1px 3px rgba(245,158,11,0.25), 0 4px 16px rgba(245,158,11,0.20)',
          cursor:'pointer',
        }}>
          <UnlockIcon size={20} sw={2}/>
          Unlock for €0.99
        </button>
        <div style={{
          marginTop:10, textAlign:'center',
          fontFamily:'var(--font-body)', fontSize:11, color:'var(--ink-subtle)',
        }}>One-time unlock · no subscription required</div>
      </div>

      {modal && <ComingSoonModal onClose={() => setModal(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<MatchLocked/>);
</script>
</body>
</html>
