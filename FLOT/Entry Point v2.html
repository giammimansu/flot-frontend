<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLOT — Entry Point v2</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #E8E8ED; font-family: var(--font-body);
  }
  .phone {
    width: 375px; height: 812px; background: var(--surface-0);
    border-radius: 44px; border: 1.5px solid var(--hairline-strong);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
    box-shadow: 0 40px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .pressable { transition: transform 120ms var(--ease-out); cursor: pointer; }
  .pressable:active { transform: scale(0.97); }
  @keyframes spin { to { transform: rotate(360deg) } }
  @keyframes mPulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
  @keyframes countUp { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:translateY(0) } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MalpensaComponents.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Icons ── */
const FlightIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.7.5-1.1z"/>
  </svg>
);
const UsersMatchIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
    <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </svg>
);
const SplitIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/>
    <path d="M13 6h3a2 2 0 0 1 2 2v7"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/>
  </svg>
);

const GoogleLogo = () => (
  <svg width="18" height="18" viewBox="0 0 48 48">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.998 23.998 0 000 24c0 3.77.9 7.35 2.56 10.56l7.97-5.97z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/>
  </svg>
);
const AppleLogo = () => (
  <svg width="16" height="19" viewBox="0 0 18 22" fill="currentColor">
    <path d="M14.94 11.58c-.02-2.27 1.86-3.37 1.94-3.42-1.06-1.54-2.71-1.75-3.29-1.78-1.4-.14-2.73.82-3.44.82-.71 0-1.82-.8-2.99-.78-1.54.02-2.96.9-3.75 2.27-1.6 2.78-.41 6.9 1.15 9.15.76 1.1 1.67 2.34 2.87 2.3 1.15-.05 1.58-.75 2.97-.75 1.39 0 1.78.75 2.99.72 1.24-.02 2.02-1.12 2.77-2.23.87-1.27 1.23-2.5 1.25-2.57-.03-.01-2.4-.92-2.42-3.65l-.05-.08zM12.63 4.54c.63-.77 1.06-1.83.94-2.89-.91.04-2.01.61-2.66 1.37-.59.68-1.1 1.77-.96 2.81 1.01.08 2.04-.51 2.68-1.29z"/>
  </svg>
);

/* ── Animated Counter ── */
const useCountUp = (target, duration = 1200) => {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      setVal(Math.round(ease * target));
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [target, duration]);
  return val;
};

const LiveSavingsCounter = () => {
  // Simulates GET /airports/MXP/stats
  const totalSaved = 12847;
  const animated = useCountUp(totalSaved, 1200);
  return (
    <div style={{
      margin: '14px 20px 0', padding: '14px 16px',
      background: 'var(--surface-1)', borderRadius: 16,
      display: 'flex', alignItems: 'center', gap: 12,
      border: '1px solid var(--hairline)',
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 999,
        background: 'var(--success-soft)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: 'var(--success)', flexShrink: 0,
      }}>
        <MIcon name="zap" size={18} sw={2}/>
      </div>
      <div>
        <div style={{
          fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 800,
          color: 'var(--success)', fontFeatureSettings: '"tnum" 1',
          letterSpacing: '-0.02em', lineHeight: 1,
        }}>
          €{animated.toLocaleString('it-IT')}
        </div>
        <div style={{
          fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600,
          color: 'var(--ink-subtle)', letterSpacing: '0.04em', textTransform: 'uppercase',
          marginTop: 2,
        }}>
          TRAVELERS HAVE SAVED
        </div>
      </div>
    </div>
  );
};

/* ── Main App ── */
const EntryPoint = () => {
  const [loading, setLoading] = React.useState(null);
  const [error, setError] = React.useState(null);

  const handleLogin = (provider) => {
    setError(null);
    setLoading(provider);
    setTimeout(() => setLoading(null), 2000);
  };

  const steps = [
    { icon: <FlightIcon/>, title: 'Add your flight', desc: 'Terminal, destination & time — up to 7 days ahead.' },
    { icon: <UsersMatchIcon/>, title: 'We find your match', desc: 'Instant notification when a verified traveler is heading your way.' },
    { icon: <SplitIcon/>, title: 'Meet & share', desc: 'Pay the taxi driver together — we never touch the fare.' },
  ];

  return (
    <div className="phone">
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflowY:'auto', WebkitOverflowScrolling:'touch' }}>

        {/* LOGO */}
        <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center' }}>
            <div style={{ width:8, height:8, borderRadius:999, background:'var(--amber)', marginRight:6 }}></div>
            <span style={{ fontFamily:'var(--font-display)', fontSize:22, fontWeight:800, color:'var(--ink)', letterSpacing:'-0.01em' }}>FLOT</span>
          </div>
        </div>

        {/* KICKER PILL */}
        <div style={{ padding:'16px 20px 0' }}>
          <span style={{
            display:'inline-flex', alignItems:'center', gap:6,
            padding:'5px 12px', borderRadius:999,
            background:'var(--amber-soft)', fontSize:12, fontWeight:600,
            fontFamily:'var(--font-body)', color:'#92400E',
          }}>
            <span style={{
              width:6, height:6, borderRadius:999, background:'var(--amber)',
              animation:'mPulse 1.4s infinite',
            }}></span>
            Malpensa · Milano
          </span>
        </div>

        {/* HEADLINE */}
        <div style={{ padding:'14px 20px 0' }}>
          <h1 style={{
            fontFamily:'var(--font-display)', fontSize:32, fontWeight:800,
            lineHeight:1.08, letterSpacing:'-0.03em', color:'var(--ink)', margin:0,
            textWrap:'balance',
          }}>
            Plan your shared ride from the airport.
          </h1>
          <p style={{
            fontFamily:'var(--font-body)', fontSize:14, lineHeight:1.45,
            color:'var(--ink-muted)', margin:'10px 0 0', textWrap:'pretty',
          }}>
            Add your flight, we'll find a traveler heading your way. You share a standard taxi together — we don't drive you.
          </p>
        </div>

        {/* LIVE SAVINGS COUNTER */}
        <LiveSavingsCounter />

        {/* HOW IT WORKS */}
        <div style={{ margin:'18px 20px 0' }}>
          <div style={{
            fontFamily:'var(--font-body)', fontSize:11, fontWeight:600,
            color:'var(--ink-subtle)', letterSpacing:'0.04em', textTransform:'uppercase',
            marginBottom:10,
          }}>HOW IT WORKS</div>
          <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
            {steps.map((s, i) => (
              <div key={i} style={{ display:'flex', gap:14, padding:'11px 0', borderBottom: i < 2 ? '1px solid var(--surface-2)' : 'none' }}>
                <div style={{
                  width:38, height:38, borderRadius:14, background:'var(--surface-2)',
                  display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-muted)', flexShrink:0,
                  marginTop:1,
                }}>
                  {s.icon}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{
                      fontFamily:'var(--font-display)', fontSize:13, fontWeight:700,
                      color:'var(--ink-subtle)', fontFeatureSettings:'"tnum" 1', minWidth:16,
                    }}>{i + 1}.</span>
                    <span style={{ fontFamily:'var(--font-body)', fontSize:14, fontWeight:600, color:'var(--ink)' }}>{s.title}</span>
                  </div>
                  <div style={{
                    fontFamily:'var(--font-body)', fontSize:12.5, color:'var(--ink-muted)',
                    lineHeight:1.4, marginTop:2, paddingLeft:24,
                  }}>{s.desc}</div>
                </div>
              </div>
            ))}
          </div>
          {/* Identity trust line */}
          <div style={{
            display:'flex', alignItems:'center', gap:6, marginTop:10,
            padding:'8px 12px', borderRadius:12, background:'var(--surface-2)',
          }}>
            <MIcon name="shield" size={14} color="var(--ink-subtle)"/>
            <span style={{ fontFamily:'var(--font-body)', fontSize:12, color:'var(--ink-muted)', fontWeight:500 }}>
              All profiles verified via <span style={{ fontWeight:600, color:'var(--ink)' }}>Stripe Identity</span>
            </span>
          </div>
        </div>

        {/* SPACER */}
        <div style={{ flex:1, minHeight:14 }}></div>

        {/* GUARANTEE BANNER */}
        <div style={{
          margin:'0 20px 12px', padding:'12px 16px',
          background:'var(--success-soft)', borderRadius:16,
          display:'flex', alignItems:'center', gap:12,
        }}>
          <div style={{
            width:32, height:32, borderRadius:999, background:'rgba(22,163,74,0.15)',
            display:'flex', alignItems:'center', justifyContent:'center', color:'var(--success)', flexShrink:0,
          }}>
            <MIcon name="check" size={16} sw={2.5}/>
          </div>
          <div>
            <div style={{ fontFamily:'var(--font-body)', fontSize:14, fontWeight:700, color:'#15803D' }}>
              No match? No charge. Ever.
            </div>
            <div style={{ fontFamily:'var(--font-body)', fontSize:12, color:'#15803D', opacity:0.75, marginTop:1 }}>
              We only connect you — zero taxi risk.
            </div>
          </div>
        </div>

        {/* ERROR */}
        {error && (
          <div style={{
            margin:'0 20px 10px', padding:'10px 14px', borderRadius:12,
            background:'var(--error-soft)', display:'flex', alignItems:'center', gap:8,
          }}>
            <MIcon name="info" size={14} color="var(--error)"/>
            <span style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--error)' }}>{error}</span>
          </div>
        )}

        {/* CTA BUTTONS */}
        <div style={{ padding:'0 20px', flexShrink:0 }}>
          <button className="pressable" onClick={() => handleLogin('google')} disabled={!!loading} style={{
            width:'100%', height:56, borderRadius:24,
            background:'var(--amber)', color:'var(--ink)', border:'none',
            fontFamily:'var(--font-body)', fontSize:16, fontWeight:700,
            display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            boxShadow:'0 1px 3px rgba(245,158,11,0.25), 0 4px 16px rgba(245,158,11,0.20)',
            cursor: loading ? 'wait' : 'pointer',
            opacity: loading === 'apple' ? 0.5 : 1,
          }}>
            {loading === 'google' ? (
              <span style={{ display:'inline-flex', alignItems:'center', gap:8 }}>
                <span style={{ width:18, height:18, border:'2.5px solid rgba(15,23,42,0.25)', borderTopColor:'var(--ink)', borderRadius:999, animation:'spin 700ms linear infinite', display:'inline-block' }}></span>
                One moment…
              </span>
            ) : (
              <><GoogleLogo/> Plan your ride</>
            )}
          </button>

          <button className="pressable" onClick={() => handleLogin('apple')} disabled={!!loading} style={{
            width:'100%', height:48, borderRadius:16, marginTop:10,
            background:'var(--ink)', color:'#fff', border:'none',
            fontFamily:'var(--font-body)', fontSize:14, fontWeight:600,
            display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            cursor: loading ? 'wait' : 'pointer',
            opacity: loading === 'google' ? 0.5 : 1,
          }}>
            {loading === 'apple' ? (
              <span style={{ display:'inline-flex', alignItems:'center', gap:8 }}>
                <span style={{ width:16, height:16, border:'2px solid rgba(255,255,255,0.3)', borderTopColor:'#fff', borderRadius:999, animation:'spin 700ms linear infinite', display:'inline-block' }}></span>
                One moment…
              </span>
            ) : (
              <><AppleLogo/> Continue with Apple</>
            )}
          </button>
        </div>

        {/* LEGAL */}
        <div style={{
          padding:'12px 30px 8px', textAlign:'center',
          fontFamily:'var(--font-body)', fontSize:11, lineHeight:1.5, color:'var(--ink-subtle)',
        }}>
          By signing up you agree to our <span style={{ textDecoration:'underline', textUnderlineOffset:2, cursor:'pointer' }}>Terms of Service</span> and <span style={{ textDecoration:'underline', textUnderlineOffset:2, cursor:'pointer' }}>Privacy Policy</span>.
        </div>

        {/* HOME INDICATOR */}
        <div style={{ display:'flex', justifyContent:'center', padding:'6px 0 10px' }}>
          <div style={{ width:134, height:5, borderRadius:999, background:'rgba(15,23,42,0.18)' }}></div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<EntryPoint/>);
</script>
</body>
</html>
