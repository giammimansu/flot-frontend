<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLOT — Entry Point</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #E8E8ED; font-family: var(--font-body);
  }
  .phone {
    width: 375px; height: 812px; background: var(--surface-0);
    border-radius: 44px; border: 1.5px solid var(--hairline-strong);
    overflow: hidden; position: relative; display: flex; flex-direction: column;
    box-shadow: 0 40px 80px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .pressable { transition: transform 120ms var(--ease-out); cursor: pointer; }
  .pressable:active { transform: scale(0.97); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="MalpensaComponents.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// Simulated airportStore data
const airport = { code: 'MXP', name: 'Malpensa', baseFare: 120 };
const savings = airport.baseFare / 2;

const CalendarIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
  </svg>
);
const UsersMatchIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </svg>
);
const SplitIcon = () => (
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><path d="M11 18H8a2 2 0 0 1-2-2V9"/>
  </svg>
);

const GoogleLogo = () => (
  <svg width="18" height="18" viewBox="0 0 48 48">
    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
    <path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.998 23.998 0 000 24c0 3.77.9 7.35 2.56 10.56l7.97-5.97z"/>
    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/>
  </svg>
);

const AppleLogo = () => (
  <svg width="16" height="19" viewBox="0 0 18 22" fill="currentColor">
    <path d="M14.94 11.58c-.02-2.27 1.86-3.37 1.94-3.42-1.06-1.54-2.71-1.75-3.29-1.78-1.4-.14-2.73.82-3.44.82-.71 0-1.82-.8-2.99-.78-1.54.02-2.96.9-3.75 2.27-1.6 2.78-.41 6.9 1.15 9.15.76 1.1 1.67 2.34 2.87 2.3 1.15-.05 1.58-.75 2.97-.75 1.39 0 1.78.75 2.99.72 1.24-.02 2.02-1.12 2.77-2.23.87-1.27 1.23-2.5 1.25-2.57-.03-.01-2.4-.92-2.42-3.65l-.05-.08zM12.63 4.54c.63-.77 1.06-1.83.94-2.89-.91.04-2.01.61-2.66 1.37-.59.68-1.1 1.77-.96 2.81 1.01.08 2.04-.51 2.68-1.29z"/>
  </svg>
);

const EntryPoint = () => {
  const [loading, setLoading] = React.useState(null); // 'google' | 'apple' | null
  const [error, setError] = React.useState(null);

  const handleLogin = (provider) => {
    setError(null);
    setLoading(provider);
    // Simulated — in prod: Amplify social sign-in
    setTimeout(() => setLoading(null), 2000);
  };

  const steps = [
    { icon: <CalendarIcon/>, text: 'Prenota la tua fascia oraria' },
    { icon: <UsersMatchIcon/>, text: 'Ti abbiniamo a un viaggiatore' },
    { icon: <SplitIcon/>, text: 'Dividete taxi e costo' },
  ];

  return (
    <div className="phone">
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflowY:'auto', WebkitOverflowScrolling:'touch' }}>

        {/* LOGO */}
        <div style={{ padding:'16px 20px 0', display:'flex', alignItems:'center' }}>
          <div style={{ width:8, height:8, borderRadius:999, background:'var(--amber)', marginRight:6 }}></div>
          <span style={{ fontFamily:'var(--font-display)', fontSize:22, fontWeight:800, color:'var(--ink)', letterSpacing:'-0.01em' }}>FLOT</span>
        </div>

        {/* HEADLINE */}
        <div style={{ padding:'24px 20px 0' }}>
          <h1 style={{
            fontFamily:'var(--font-display)', fontSize:34, fontWeight:800,
            lineHeight:1.05, letterSpacing:'-0.03em', color:'var(--ink)', margin:0,
            textWrap:'balance',
          }}>
            Il taxi da {airport.name} costa €{airport.baseFare}.<br/>
            <span style={{ color:'var(--amber)' }}>Con Flot ne paghi la metà.</span>
          </h1>
        </div>

        {/* TRUST SIGNAL */}
        <div style={{
          margin:'14px 20px 0', display:'flex', alignItems:'center', gap:8,
        }}>
          <div style={{ display:'flex' }}>
            {[0,1,2,3,4].map(i => (
              <svg key={i} width="14" height="14" viewBox="0 0 24 24" fill="var(--amber)" style={{ marginRight:1 }}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            ))}
          </div>
          <span style={{ fontFamily:'var(--font-body)', fontSize:13, fontWeight:500, color:'var(--ink-muted)' }}>
            4.9 · <span style={{ fontWeight:600, color:'var(--ink)' }}>2.340</span> viaggiatori abbinati
          </span>
        </div>

        {/* 3-STEP EXPLANATION */}
        <div style={{ margin:'22px 20px 0', display:'flex', flexDirection:'column', gap:0 }}>
          {steps.map((s, i) => (
            <div key={i} style={{ display:'flex', alignItems:'center', gap:14, padding:'12px 0', borderBottom: i < 2 ? '1px solid var(--surface-2)' : 'none' }}>
              <div style={{
                width:40, height:40, borderRadius:14, background:'var(--surface-2)',
                display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ink-muted)', flexShrink:0,
              }}>
                {s.icon}
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10, flex:1 }}>
                <span style={{
                  fontFamily:'var(--font-display)', fontSize:14, fontWeight:700, color:'var(--ink-subtle)',
                  fontFeatureSettings:'"tnum" 1', minWidth:18,
                }}>{i + 1}.</span>
                <span style={{ fontFamily:'var(--font-body)', fontSize:15, fontWeight:500, color:'var(--ink)' }}>{s.text}</span>
              </div>
            </div>
          ))}
        </div>

        {/* SAVINGS CALLOUT */}
        <div style={{
          margin:'18px 20px 0', padding:'14px 16px',
          background:'var(--success-soft)', borderRadius:16,
          display:'flex', alignItems:'center', gap:12,
        }}>
          <div style={{
            width:36, height:36, borderRadius:999, background:'rgba(22,163,74,0.15)',
            display:'flex', alignItems:'center', justifyContent:'center', color:'var(--success)', flexShrink:0,
          }}>
            <MIcon name="sparkles" size={18} sw={2}/>
          </div>
          <div>
            <span style={{ fontFamily:'var(--font-body)', fontSize:14, fontWeight:600, color:'#15803D' }}>
              Risparmio medio: <span style={{ fontFamily:'var(--font-display)', fontWeight:800, fontFeatureSettings:'"tnum" 1' }}>€{savings}</span> a corsa
            </span>
            <div style={{ fontFamily:'var(--font-body)', fontSize:12, color:'#15803D', opacity:0.75, marginTop:2 }}>
              Tariffa fissa €{airport.baseFare} · divisa in due
            </div>
          </div>
        </div>

        {/* SPACER */}
        <div style={{ flex:1, minHeight:16 }}></div>

        {/* ERROR */}
        {error && (
          <div style={{
            margin:'0 20px 10px', padding:'10px 14px', borderRadius:12,
            background:'var(--error-soft)', display:'flex', alignItems:'center', gap:8,
          }}>
            <MIcon name="info" size={14} color="var(--error)"/>
            <span style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--error)' }}>{error}</span>
          </div>
        )}

        {/* CTA AREA — sticky concept */}
        <div style={{ padding:'0 20px', flexShrink:0 }}>
          {/* Primary CTA */}
          <button className="pressable" onClick={() => handleLogin('google')} disabled={!!loading} style={{
            width:'100%', height:56, borderRadius:24,
            background:'var(--amber)', color:'var(--ink)', border:'none',
            fontFamily:'var(--font-body)', fontSize:16, fontWeight:700,
            display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            boxShadow:'0 1px 3px rgba(245,158,11,0.25), 0 4px 16px rgba(245,158,11,0.20)',
            cursor: loading ? 'wait' : 'pointer',
            opacity: loading === 'apple' ? 0.5 : 1,
          }}>
            {loading === 'google' ? (
              <span style={{ display:'inline-flex', alignItems:'center', gap:8 }}>
                <span style={{ width:18, height:18, border:'2.5px solid rgba(15,23,42,0.25)', borderTopColor:'var(--ink)', borderRadius:999, animation:'spin 700ms linear infinite', display:'inline-block' }}></span>
                Un momento…
              </span>
            ) : (
              <>
                <GoogleLogo/>
                Prenota e risparmia €{savings}
              </>
            )}
          </button>

          {/* Secondary — Apple */}
          <button className="pressable" onClick={() => handleLogin('apple')} disabled={!!loading} style={{
            width:'100%', height:48, borderRadius:16, marginTop:10,
            background:'var(--ink)', color:'#fff', border:'none',
            fontFamily:'var(--font-body)', fontSize:14, fontWeight:600,
            display:'flex', alignItems:'center', justifyContent:'center', gap:8,
            cursor: loading ? 'wait' : 'pointer',
            opacity: loading === 'google' ? 0.5 : 1,
          }}>
            {loading === 'apple' ? (
              <span style={{ display:'inline-flex', alignItems:'center', gap:8 }}>
                <span style={{ width:16, height:16, border:'2px solid rgba(255,255,255,0.3)', borderTopColor:'#fff', borderRadius:999, animation:'spin 700ms linear infinite', display:'inline-block' }}></span>
                Un momento…
              </span>
            ) : (
              <><AppleLogo/> Continua con Apple</>
            )}
          </button>
        </div>

        {/* LEGAL */}
        <div style={{
          padding:'12px 30px 8px', textAlign:'center',
          fontFamily:'var(--font-body)', fontSize:11, lineHeight:1.5, color:'var(--ink-subtle)',
        }}>
          Prenotando accetti i <span style={{ textDecoration:'underline', textUnderlineOffset:2, cursor:'pointer' }}>Termini di servizio</span> e la <span style={{ textDecoration:'underline', textUnderlineOffset:2, cursor:'pointer' }}>Privacy Policy</span>.
        </div>

        {/* HOME INDICATOR */}
        <div style={{ display:'flex', justifyContent:'center', padding:'6px 0 10px' }}>
          <div style={{ width:134, height:5, borderRadius:999, background:'rgba(15,23,42,0.18)' }}></div>
        </div>
      </div>

      <style>{`@keyframes spin { to { transform: rotate(360deg) } }`}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<EntryPoint/>);
</script>
</body>
</html>
